<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>随机生成页面</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 28px;
      padding: 50px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      margin-bottom: 22px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 72px);
      margin-bottom: 20px;
      line-height: 1.1;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 35px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .btn {
      border: none;
      padding: 14px 26px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.25s;
    }

    .btn-primary {
      background: #fff;
      color: #1d2671;
      font-weight: bold;
    }

    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .item {
      padding: 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.13);
      text-align: left;
    }

    .item h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .item span {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.6;
      display: block;
    }

    footer {
      margin-top: 36px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.65);
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">RANDOM PAGE</div>

    <h1>欢迎来到随机灵感空间</h1>

    <p>
      这是一个随机生成的单页 HTML 页面，适合用作项目首页、临时展示页、
      产品介绍页或前端练习模板。
    </p>

    <div class="buttons">
      <button class="btn btn-primary" onclick="showMessage()">开始探索</button>
      <button class="btn btn-secondary" onclick="changeBg()">随机换背景</button>
    </div>

    <section class="grid">
      <div class="item">
        <h3>快速部署</h3>
        <span>只需要一个 index.html 文件，就可以直接上传到服务器或本地打开。</span>
      </div>

      <div class="item">
        <h3>响应式布局</h3>
        <span>自动适配电脑、平板和手机屏幕，页面结构简洁清晰。</span>
      </div>

      <div class="item">
        <h3>轻量美观</h3>
        <span>使用纯 HTML、CSS 和 JavaScript，无需额外依赖。</span>
      </div>
    </section>

    <footer>
      © 2026 Random Design Page. All rights reserved.
    </footer>
  </main>

  <script>
    function showMessage() {
      alert("欢迎开始你的项目！");
    }

    function changeBg() {
      const colors = [
        ["#1d2671", "#c33764"],
        ["#11998e", "#38ef7d"],
        ["#fc5c7d", "#6a82fb"],
        ["#f7971e", "#ffd200"],
        ["#0f2027", "#2c5364"],
        ["#8e2de2", "#4a00e0"]
      ];

      const random = colors[Math.floor(Math.random() * colors.length)];
      document.body.style.background =
        `linear-gradient(135deg, ${random[0]}, ${random[1]})`;
    }
  </script>
</body>
</html>
